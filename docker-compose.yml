version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: codedocai-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=codedocai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - codedocai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/codedocai --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CodeDocAI Application (Frontend + Backend)
  codedocai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedocai-app
    restart: always
    ports:
      - "0.0.0.0:3000:3000"  # Allows network access from other devices
    environment:
      # Application Configuration
      - NODE_ENV=production
      - PORT=3000
      
      # API Keys (REQUIRED - Set in .env file)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Database Configuration
      - MONGODB_URI=mongodb://mongodb:27017
      - DB_NAME=codedocai
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - codedocai-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Mount for logs (optional)
      - ./logs:/app/logs

# Docker Networks
networks:
  codedocai-network:
    driver: bridge

# Docker Volumes for Data Persistence
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
